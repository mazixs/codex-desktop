name: "\U0001F41B Bug Report"
description: Report a bug or unexpected behavior in Codex Desktop for Linux
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `./start.sh`
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Distribution
      description: e.g. "Arch Linux 2026.03", "Ubuntu 24.04"
      placeholder: CachyOS (Arch-based)
    validations:
      required: true

  - type: dropdown
    id: display-server
    attributes:
      label: Display Server
      options:
        - X11
        - Wayland
        - Not sure
    validations:
      required: true

  - type: input
    id: electron-version
    attributes:
      label: Electron Version
      description: Run `./start.sh --version` or check `package.json`
      placeholder: "40.0.0"

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - Portable tar.gz
        - Arch package (pkg.tar.zst)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any terminal output, crash logs, or error messages.
      render: text
