name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ACTIONLINT_VERSION: 1.7.8

jobs:
  build-portable:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack pnpm
        run: ./scripts/enable-pnpm.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file imagemagick p7zip-full python3 shellcheck xvfb

      - name: Install actionlint
        run: |
          export ACTIONLINT_INSTALL_DIR=/tmp/actionlint/bin
          ./scripts/install-actionlint.sh
          echo "/tmp/actionlint/bin" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions workflows
        run: PATH="/tmp/actionlint/bin:$PATH" ./scripts/validate-workflows.sh

      - name: Install JavaScript dependencies
        working-directory: codex-linux-build
        run: pnpm install --frozen-lockfile

      - name: Lint shell entrypoints
        run: |
          shellcheck codex-linux-build/build.sh
          shellcheck codex-linux-build/start.sh
          shellcheck scripts/generate-release-notes.sh
          shellcheck scripts/build-arch-package.sh
          shellcheck scripts/build-deb-package.sh
          shellcheck packaging/arch/codex-desktop-wrapper.sh
          shellcheck packaging/skills-overrides/.curated/playwright/scripts/playwright_cli.sh

      - name: Build portable release artifact
        working-directory: codex-linux-build
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: pnpm run package:portable

      - name: Verify portable artifact integrity
        run: ./scripts/verify-portable-artifact.sh --artifacts-dir codex-linux-build/artifacts

      - name: Generate release notes
        run: ./scripts/generate-release-notes.sh --ref "${GITHUB_REF_NAME}" --metadata codex-linux-build/artifacts/build-metadata.env --output codex-linux-build/artifacts/release-notes.md

      - name: Verify release notes and asset contract
        run: ./scripts/verify-portable-artifact.sh --artifacts-dir codex-linux-build/artifacts --release-notes codex-linux-build/artifacts/release-notes.md

      - name: Upload portable release bundle
        uses: actions/upload-artifact@v7
        with:
          name: portable-release-${{ github.ref_name }}
          retention-days: 1
          path: |
            codex-linux-build/artifacts/*.tar.gz
            codex-linux-build/artifacts/*.sha256
            codex-linux-build/artifacts/build-metadata.env
            codex-linux-build/artifacts/release-notes.md

  build-arch-package:
    needs: build-portable
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable release bundle
        uses: actions/download-artifact@v8
        with:
          name: portable-release-${{ github.ref_name }}
          path: /tmp/codex-portable

      - name: Build Arch package in Arch container
        run: |
          set -euo pipefail
          mkdir -p /tmp/codex-arch-output
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /tmp/codex-portable:/portable \
            -v /tmp/codex-arch-output:/output \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              source /workspace/scripts/ci-lib.sh
              pacman -Syu --noconfirm base-devel xorg-server-xvfb xorg-xauth
              useradd -m builder
              chown -R builder:builder /workspace /portable /output
              archive="$(find_single_matching_file /portable "$(portable_release_glob)" "portable archive")"
              runuser -u builder -- bash -lc "cd /workspace && ./scripts/build-arch-package.sh --source \"$archive\" --metadata /portable/build-metadata.env --output-dir /output"
              package_file="$(find_single_matching_file /output "$(arch_release_glob)" "Arch package")"
              cd /workspace
              ./scripts/verify-arch-package.sh --package "$package_file" --smoke-user builder
            '

      - name: Upload Arch package bundle
        uses: actions/upload-artifact@v7
        with:
          name: arch-release-${{ github.ref_name }}
          retention-days: 1
          path: |
            /tmp/codex-arch-output/*.pkg.tar.zst
            /tmp/codex-arch-output/*.pkg.tar.zst.sha256

  build-deb-package:
    needs: build-portable
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable release bundle
        uses: actions/download-artifact@v8
        with:
          name: portable-release-${{ github.ref_name }}
          path: /tmp/codex-portable

      - name: Install Debian packaging and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-6 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xdg-utils \
            xvfb

      - name: Build Debian package
        run: |
          set -euo pipefail
          source ./scripts/ci-lib.sh
          archive="$(find_single_matching_file /tmp/codex-portable "$(portable_release_glob)" "portable archive")"
          ./scripts/build-deb-package.sh --source "$archive" --metadata /tmp/codex-portable/build-metadata.env --output-dir /tmp/codex-deb-output

      - name: Verify Debian package
        run: |
          set -euo pipefail
          source ./scripts/ci-lib.sh
          package_file="$(find_single_matching_file /tmp/codex-deb-output "$(deb_release_glob)" "Debian package")"
          ./scripts/verify-deb-package.sh --package "$package_file"

      - name: Upload Debian package bundle
        uses: actions/upload-artifact@v7
        with:
          name: deb-release-${{ github.ref_name }}
          retention-days: 1
          path: |
            /tmp/codex-deb-output/*.deb
            /tmp/codex-deb-output/*.deb.sha256

  publish-release:
    needs:
      - build-portable
      - build-arch-package
      - build-deb-package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable release bundle
        uses: actions/download-artifact@v8
        with:
          name: portable-release-${{ github.ref_name }}
          path: /tmp/release-portable

      - name: Download Arch package bundle
        uses: actions/download-artifact@v8
        with:
          name: arch-release-${{ github.ref_name }}
          path: /tmp/release-arch

      - name: Download Debian package bundle
        uses: actions/download-artifact@v8
        with:
          name: deb-release-${{ github.ref_name }}
          path: /tmp/release-deb

      - name: Verify release asset contract
        run: ./scripts/verify-release-assets.sh --portable-dir /tmp/release-portable --arch-dir /tmp/release-arch --deb-dir /tmp/release-deb

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source ./scripts/ci-lib.sh
          repo="${{ github.repository }}"
          command -v gh >/dev/null 2>&1 || { echo "::error::gh CLI is not available on the runner"; exit 1; }
          portable_archive="$(find_single_matching_file /tmp/release-portable "$(portable_release_glob)" "portable release archive")"
          portable_checksum="${portable_archive}.sha256"
          build_metadata="/tmp/release-portable/build-metadata.env"
          arch_archive="$(find_single_matching_file /tmp/release-arch "$(arch_release_glob)" "Arch release package")"
          arch_checksum="${arch_archive}.sha256"
          deb_archive="$(find_single_matching_file /tmp/release-deb "$(deb_release_glob)" "Debian release package")"
          deb_checksum="${deb_archive}.sha256"
          require_file "$portable_checksum"
          require_file "$build_metadata"
          require_file "$arch_checksum"
          require_file "$deb_checksum"
          require_file /tmp/release-portable/release-notes.md
          if gh release view "${GITHUB_REF_NAME}" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "$portable_archive" \
              "$portable_checksum" \
              "$build_metadata" \
              "$arch_archive" \
              "$arch_checksum" \
              "$deb_archive" \
              "$deb_checksum" \
              --repo "$repo" \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" --repo "$repo" --title "${GITHUB_REF_NAME}" --notes-file /tmp/release-portable/release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              "$portable_archive" \
              "$portable_checksum" \
              "$build_metadata" \
              "$arch_archive" \
              "$arch_checksum" \
              "$deb_archive" \
              "$deb_checksum" \
              --repo "$repo" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file /tmp/release-portable/release-notes.md
          fi
