name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: 1.7.8

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack pnpm
        run: ./scripts/enable-pnpm.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file imagemagick p7zip-full python3 shellcheck xvfb

      - name: Install actionlint
        run: |
          export ACTIONLINT_INSTALL_DIR=/tmp/actionlint/bin
          ./scripts/install-actionlint.sh
          echo "/tmp/actionlint/bin" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions workflows
        run: PATH="/tmp/actionlint/bin:$PATH" ./scripts/validate-workflows.sh

      - name: Install JavaScript dependencies
        working-directory: codex-linux-build
        run: pnpm install --frozen-lockfile

      - name: Validate repository scripts
        working-directory: codex-linux-build
        run: pnpm run verify

      - name: Run ShellCheck
        run: |
          shellcheck codex-linux-build/build.sh
          shellcheck codex-linux-build/start.sh
          shellcheck scripts/generate-release-notes.sh
          shellcheck scripts/build-arch-package.sh
          shellcheck packaging/arch/codex-desktop-wrapper.sh
          shellcheck packaging/skills-overrides/.curated/playwright/scripts/playwright_cli.sh

      - name: Generate sample release notes
        run: ./scripts/generate-release-notes.sh --ref HEAD --output /tmp/release-notes.md

  smoke-build:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack pnpm
        run: ./scripts/enable-pnpm.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file imagemagick p7zip-full python3 xvfb

      - name: Install JavaScript dependencies
        working-directory: codex-linux-build
        run: pnpm install --frozen-lockfile

      - name: Build portable artifact
        working-directory: codex-linux-build
        run: pnpm run package:portable

      - name: Verify portable artifact integrity
        run: ./scripts/verify-portable-artifact.sh --artifacts-dir codex-linux-build/artifacts

      - name: Upload smoke-build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: smoke-build-${{ github.sha }}
          retention-days: 3
          path: |
            codex-linux-build/artifacts/*.tar.gz
            codex-linux-build/artifacts/*.sha256
            codex-linux-build/artifacts/build-metadata.env

  arch-package-smoke:
    if: github.event_name != 'pull_request'
    needs: smoke-build
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download smoke-build artifacts
        uses: actions/download-artifact@v7
        with:
          name: smoke-build-${{ github.sha }}
          path: /tmp/codex-portable

      - name: Build Arch package in Arch container
        run: |
          set -euo pipefail
          mkdir -p /tmp/codex-arch-output
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -v /tmp/codex-portable:/portable \
            -v /tmp/codex-arch-output:/output \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              source /workspace/scripts/ci-lib.sh
              pacman -Syu --noconfirm base-devel xorg-server-xvfb xorg-xauth
              useradd -m builder
              chown -R builder:builder /workspace /portable /output
              archive="$(find_single_matching_file /portable "$(portable_release_glob)" "portable archive")"
              runuser -u builder -- bash -lc "cd /workspace && ./scripts/build-arch-package.sh --source \"$archive\" --metadata /portable/build-metadata.env --output-dir /output"
              package_file="$(find_single_matching_file /output "$(arch_release_glob)" "Arch package")"
              cd /workspace
              ./scripts/verify-arch-package.sh --package "$package_file" --smoke-user builder
            '

      - name: Upload Arch smoke artifacts
        uses: actions/upload-artifact@v6
        with:
          name: arch-smoke-build-${{ github.sha }}
          retention-days: 3
          path: |
            /tmp/codex-arch-output/*.pkg.tar.zst
            /tmp/codex-arch-output/*.pkg.tar.zst.sha256
