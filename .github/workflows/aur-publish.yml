name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 0.3.0)'
        required: true
        type: string
      sha256:
        description: 'SHA-256 of the .pkg.tar.zst release asset. Leave empty to compute automatically.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  prepare-aur:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: archlinux:base

    steps:
      - name: Install build tools
        run: pacman -Syu --noconfirm base-devel curl

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create unprivileged builder
        run: |
          useradd -m builder
          chown -R builder:builder .

      - name: Update PKGBUILD and generate .SRCINFO
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SHA256: ${{ inputs.sha256 }}
        run: |
          set -euo pipefail
          cd packaging/aur

          VERSION="$INPUT_VERSION"
          SHA256="$INPUT_SHA256"

          if [ -z "$SHA256" ]; then
            ARCHIVE_URL="https://github.com/mazixs/codex-desktop/releases/download/v${VERSION}/codex-desktop-native-${VERSION}-archlinux-x86_64.pkg.tar.zst"
            echo "Downloading ${ARCHIVE_URL} to compute sha256..." >&2
            TMP_ARCHIVE="$(mktemp)"
            curl -fSL --retry 3 -o "$TMP_ARCHIVE" "$ARCHIVE_URL"
            SHA256="$(sha256sum "$TMP_ARCHIVE" | awk '{print $1}')"
            rm -f "$TMP_ARCHIVE"
            echo "Computed sha256: ${SHA256}"
          fi

          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i "s|^pkgrel=.*|pkgrel=1|" PKGBUILD
          sed -i "s|'PLACEHOLDER_SHA256'|'${SHA256}'|" PKGBUILD
          sed -i "s|'[a-fA-F0-9]\{64\}'|'${SHA256}'|" PKGBUILD

          chown -R builder:builder .
          sudo -u builder bash -c 'makepkg --printsrcinfo > .SRCINFO'

          echo "=== PKGBUILD ==="
          cat PKGBUILD
          echo "=== .SRCINFO ==="
          cat .SRCINFO

      - name: Upload AUR metadata
        uses: actions/upload-artifact@v4
        with:
          name: aur-metadata
          include-hidden-files: true
          path: |
            packaging/aur/PKGBUILD
            packaging/aur/.SRCINFO
          retention-days: 1

  push-aur:
    runs-on: ubuntu-latest
    needs: prepare-aur
    timeout-minutes: 10

    steps:
      - name: Download AUR metadata
        uses: actions/download-artifact@v4
        with:
          name: aur-metadata
          path: aur_out

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Clone AUR repository
        run: |
          git clone ssh://aur@aur.archlinux.org/codex-desktop-native.git aur_repo

      - name: Push to AUR
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd aur_repo

          cp ../aur_out/packaging/aur/PKGBUILD .
          cp ../aur_out/packaging/aur/.SRCINFO .

          git config user.name "mazix"
          git config user.email "mazix@users.noreply.github.com"

          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi

          git commit -m "Update to ${INPUT_VERSION}"
          git push origin master
